# NoteLMs dedicated Cloudflare Tunnel (separate account from SocketHR).
# Copy to ~/.cloudflared/config-notelms.yml and replace UUID / paths.
#
# Do NOT put LM Studio (:1234) on this tunnel.
# SocketHR keeps its own tunnel + ~/.cloudflared/config.yml → :3000.

tunnel: REPLACE_WITH_NOTELMS_TUNNEL_UUID
credentials-file: /Users/REPLACE_USER/.cloudflared/REPLACE_WITH_NOTELMS_TUNNEL_UUID.json

ingress:
  - hostname: api.notelms.com
    service: http://127.0.0.1:3002
  - service: http_status:404
