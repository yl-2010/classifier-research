<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NoteLMs · Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>

:root {
  --ink: #0a2540;
  --mute: #5a738a;
  --line: #b9c9d9;
  --bg: #f3f6fa;
  --surface: #ffffff;
  --accent: #0a2540;
  --on-accent: #ffffff;
  --radius: 2px;
  --font: "Work Sans", system-ui, sans-serif;
  --display: "Source Serif 4", Georgia, serif;
}
body {
  background-image:
    linear-gradient(rgba(27,79,138,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(27,79,138,.06) 1px, transparent 1px);
  background-size: 28px 28px;
  background-color: var(--bg);
}
.brand { font-family: "IBM Plex Mono", monospace; font-size: .95rem; letter-spacing: .08em; text-transform: uppercase; }
.btn { font-family: "IBM Plex Mono", monospace; font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
.note-shell { border-top-width: 2px; }
.sent-ok { font-family: "IBM Plex Mono", monospace; font-size: 1.1rem; text-transform: uppercase; letter-spacing: .08em; }


* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.45;
}
.app { max-width: 720px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }
.top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.75rem;
}
.brand {
  border: 0; background: none; padding: 0; cursor: pointer;
  font: inherit; font-family: var(--display); font-size: 1.35rem;
  color: var(--ink); letter-spacing: -0.02em;
}
.nav { display: flex; gap: 1rem; }
.nav button {
  border: 0; background: none; padding: 0; cursor: pointer;
  font: inherit; color: var(--mute); font-size: .9rem;
}
.nav button:hover, .nav button.active { color: var(--ink); }

section[hidden] { display: none !important; }
textarea {
  width: 100%; min-height: 300px; resize: vertical;
  border: 1px solid var(--line); background: var(--surface);
  color: var(--ink); padding: 1rem 1.1rem; font: inherit;
  border-radius: var(--radius);
}
textarea:focus { outline: 2px solid color-mix(in srgb, var(--accent) 35%, transparent); outline-offset: 1px; }
.actions {
  display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 1rem;
  align-items: center;
}
.btn {
  border: 0; cursor: pointer; font: inherit; font-weight: 600;
  padding: .7rem 1.15rem; border-radius: var(--radius);
  background: var(--accent); color: var(--on-accent);
}
.btn.ghost {
  background: transparent; color: var(--ink);
  box-shadow: inset 0 0 0 1px var(--line);
}
.btn.is-disabled, .btn:disabled {
  opacity: .35; cursor: not-allowed; filter: grayscale(.3);
}
.ocr {
  display: inline-flex; gap: .45rem; align-items: center;
  margin-top: 1rem; color: var(--mute); font-size: .85rem; cursor: pointer;
}
.muted { color: var(--mute); font-size: .95rem; }

.sent-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center;
}
.sent-ok {
  margin: 0 0 .35rem; font-family: var(--display); font-size: 1.75rem;
  color: var(--accent); font-weight: 500;
}
.sent-name { margin: 0 0 .75rem; font-weight: 600; }

.processing { margin-bottom: 1rem; display: grid; gap: .5rem; }
.pending {
  display: flex; justify-content: space-between; gap: 1rem; align-items: center;
  padding: .85rem 1rem; border-radius: var(--radius);
  background: var(--surface); border: 1px dashed var(--line);
}

.folders {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .65rem;
}
.folder {
  border: 1px solid var(--line); background: var(--surface); text-align: left;
  padding: .9rem; border-radius: var(--radius); cursor: pointer; font: inherit;
  display: flex; justify-content: space-between; align-items: baseline; gap: .5rem;
  border-left: 3px solid var(--subj);
}
.fname { font-weight: 600; font-size: .92rem; }
.fcount { color: var(--mute); font-size: .85rem; }
.note-list { display: grid; gap: .5rem; }
.note-item {
  width: 100%; text-align: left; border: 1px solid var(--line); background: var(--surface);
  padding: .85rem 1rem; border-radius: var(--radius); font: inherit; cursor: pointer;
}
.note-item:hover { border-color: var(--accent); }

.page-title {
  font-family: var(--display); font-size: 1.5rem; font-weight: 500;
  margin: 0; color: var(--subj, var(--ink));
}
.note-meta {
  display: flex; flex-wrap: wrap; justify-content: space-between;
  align-items: end; gap: 1rem; margin-bottom: 1rem;
}
.subject-edit {
  display: flex; align-items: center; gap: .5rem; color: var(--mute); font-size: .9rem;
}
.subject-edit select {
  font: inherit; color: var(--ink); border: 1px solid var(--line);
  background: var(--surface); border-radius: var(--radius); padding: .4rem .55rem;
}
.saved { color: var(--accent); font-size: .85rem; font-weight: 600; }
#other-field { margin: 0 0 1rem; }
#other-field input {
  width: min(280px, 100%); padding: .55rem .7rem; font: inherit;
  border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface);
}

.note-shell {
  background: var(--surface); border: 1px solid var(--line);
  border-top: 3px solid var(--subj, var(--accent));
  border-radius: var(--radius); padding: 1.25rem 1.35rem;
}
.note-shell h1 { font-family: var(--display); font-size: 1.45rem; margin: 0 0 .75rem; color: var(--subj, var(--ink)); }
.note-shell h2 { font-size: 1rem; margin: 1.1rem 0 .4rem; }
.note-shell .eq {
  font-family: ui-monospace, monospace; padding: .5rem .7rem;
  background: color-mix(in srgb, var(--subj, var(--accent)) 10%, var(--surface));
  border-radius: calc(var(--radius) - 2px);
}

.research { width: 100%; border-collapse: collapse; font-size: .9rem; }
.research th, .research td {
  text-align: left; padding: .55rem .4rem; border-bottom: 1px solid var(--line);
}
.research th {
  color: var(--mute); font-weight: 500; font-size: .75rem;
  text-transform: uppercase; letter-spacing: .04em;
}
button.linkish {
  background: none; border: 0; padding: 0; color: var(--accent);
  font: inherit; cursor: pointer; text-decoration: underline; font-weight: 600;
}

</style>
</head>
<body>

<div class="app">
  <header class="top">
    <button type="button" class="brand" data-go="input">NoteLMs</button>
    <nav class="nav">
      <button type="button" data-go="input">New</button>
      <button type="button" data-go="library">Library</button>
      <button type="button" data-go="research">Research</button>
    </nav>
  </header>

  <main>
    <section data-step="input">
      <textarea id="note-input" placeholder="Paste notes…"></textarea>
      <div class="actions">
        <button type="button" class="btn ghost" id="upload-btn">Upload image</button>
        <input type="file" id="file-input" accept="image/*" hidden />
        <button type="button" class="btn" id="send-btn">Send</button>
      </div>
      <label class="ocr"><input type="checkbox" id="ocr-toggle" checked /> Image upload available</label>
    </section>

    <section data-step="sent" hidden>
      <div class="sent-card">
        <p class="sent-ok">Received</p>
        <p id="sent-title" class="sent-name"></p>
        <p class="muted">You’ll find it in your library when it’s ready.</p>
      </div>
      <div class="actions">
        <button type="button" class="btn" data-go="library">Library</button>
        <button type="button" class="btn ghost" data-go="input">New note</button>
      </div>
    </section>

    <section data-step="library" hidden>
      <div id="processing-list" class="processing" hidden></div>
      <div class="folders" id="folders"></div>
      <div class="actions">
        <button type="button" class="btn" data-go="input">New note</button>
      </div>
    </section>

    <section data-step="folder" hidden>
      <h1 id="folder-name" class="page-title">Physics</h1>
      <div class="note-list" id="folder-list"></div>
      <div class="actions">
        <button type="button" class="btn ghost" data-go="library">Back</button>
      </div>
    </section>

    <section data-step="note" hidden>
      <div class="note-meta">
        <h1 id="note-title" class="page-title">Note</h1>
        <div class="subject-edit">
          <label for="subject-select">Subject</label>
          <select id="subject-select"></select>
          <span id="subject-saved" class="saved" hidden>Updated</span>
        </div>
      </div>
      <div id="other-field" hidden>
        <input id="other-input" type="text" value="Study Skills" placeholder="Custom subject" />
      </div>
      <div id="note-shell" class="note-shell">
        <div id="note-body"></div>
      </div>
      <div class="actions">
        <button type="button" class="btn ghost" data-go="folder">Back</button>
        <button type="button" class="btn ghost" data-go="library">Library</button>
      </div>
    </section>

    <section data-step="research" hidden>
      <table class="research">
        <thead>
          <tr>
            <th>When</th>
            <th>Orchestrator</th>
            <th>Final</th>
            <th>Source</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="research-rows"></tbody>
      </table>
      <div class="actions">
        <button type="button" class="btn ghost" data-go="library">Library</button>
      </div>
    </section>
  </main>
</div>

<script>

const MOCK_NOTE = "Thermodynamics \u2014 Lecture 12\n\nFirst law: \u0394U = Q \u2212 W\n\u2022 Internal energy change equals heat added minus work done by the system\n\u2022 For an ideal gas, U depends only on temperature\n\nIsothermal process (\u0394T = 0):\n  \u0394U = 0 \u21d2 Q = W\n  Work: W = nRT ln(V\u2082/V\u2081)\n\nAdiabatic process (Q = 0):\n  \u0394U = \u2212W\n  TV^{\u03b3\u22121} = constant\n\nEntropy reminder: dS \u2265 \u0111Q/T (equality for reversible).";
const FORMATTED_HTML = "<h1>Thermodynamics \u2014 Lecture 12</h1>\n<section>\n  <h2>First Law</h2>\n  <p><strong>\u0394U = Q \u2212 W</strong></p>\n  <ul>\n    <li>Internal energy change equals heat added minus work done by the system</li>\n    <li>For an ideal gas, <em>U</em> depends only on temperature</li>\n  </ul>\n</section>\n<section>\n  <h2>Isothermal process</h2>\n  <p>\u0394U = 0 \u21d2 Q = W</p>\n  <p class=\"eq\">W = nRT ln(V\u2082/V\u2081)</p>\n</section>\n<section>\n  <h2>Adiabatic process</h2>\n  <p>\u0394U = \u2212W</p>\n  <p class=\"eq\">TV<sup>\u03b3\u22121</sup> = constant</p>\n</section>\n<section>\n  <h2>Entropy</h2>\n  <p>dS \u2265 \u0111Q/T</p>\n</section>";
const SUBJECTS = [["Mathematics", "#2563eb"], ["Physics", "#4f46e5"], ["Chemistry", "#d97706"], ["Biology", "#059669"], ["Computer Science", "#0891b2"], ["History", "#a16207"], ["Literature", "#be123c"], ["Economics", "#0d9488"], ["Other", "#64748b"]];
const SUBJECT_COLORS = Object.fromEntries(SUBJECTS);

/** @type {{id:string,title:string,subject:string,status:'processing'|'ready',html:string,orchestrator:string,corrected:boolean}[]} */
let notes = [
  { id: 'math-1', title: 'Derivatives cheat sheet', subject: 'Mathematics', status: 'ready', html: '', orchestrator: 'Mathematics', corrected: false },
  { id: 'math-2', title: 'Integrals workshop', subject: 'Mathematics', status: 'ready', html: '', orchestrator: 'Mathematics', corrected: false },
  { id: 'phys-1', title: 'Thermodynamics — Lecture 12', subject: 'Physics', status: 'ready', html: FORMATTED_HTML, orchestrator: 'Physics', corrected: false },
  { id: 'phys-2', title: 'Newton’s laws review', subject: 'Physics', status: 'ready', html: '', orchestrator: 'Physics', corrected: false },
  { id: 'chem-1', title: 'Stoichiometry drills', subject: 'Chemistry', status: 'ready', html: '', orchestrator: 'Chemistry', corrected: false },
  { id: 'bio-1', title: 'Cell organelles map', subject: 'Biology', status: 'ready', html: '', orchestrator: 'Biology', corrected: false },
  { id: 'bio-2', title: 'Mendelian genetics', subject: 'Biology', status: 'ready', html: '', orchestrator: 'Biology', corrected: false },
  { id: 'cs-1', title: 'Big-O notation', subject: 'Computer Science', status: 'ready', html: '', orchestrator: 'Computer Science', corrected: false },
  { id: 'hist-1', title: 'Industrial Revolution', subject: 'History', status: 'ready', html: '', orchestrator: 'History', corrected: false },
  { id: 'lit-1', title: 'Sonnet structure', subject: 'Literature', status: 'ready', html: '', orchestrator: 'Literature', corrected: false },
  { id: 'econ-1', title: 'Supply & demand', subject: 'Economics', status: 'ready', html: '', orchestrator: 'Economics', corrected: false },
  { id: 'other-1', title: 'Study skills', subject: 'Other', status: 'ready', html: '', orchestrator: 'Other', corrected: false },
];

/** Research log rows (mock). Manual subject changes update `final`. */
let research = [
  { id: 'phys-1', when: '3d', orchestrator: 'Physics', final: 'Physics', corrected: false },
  { id: 'bio-1', when: '2d', orchestrator: 'Biology', final: 'Biology', corrected: false },
  { id: 'hist-1', when: '1d', orchestrator: 'History', final: 'History', corrected: false },
];

let ocrOnline = true;
let currentFolder = 'Physics';
let currentNoteId = 'phys-1';
let pendingTimer = null;

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];

function go(s) {
  $$('[data-step]').forEach(el => { el.hidden = el.dataset.step !== s; });
  $$('.nav [data-go]').forEach(el => {
    const onLib = (s === 'folder' || s === 'note') && el.dataset.go === 'library';
    el.classList.toggle('active', el.dataset.go === s || onLib);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (s === 'library') renderLibrary();
  if (s === 'folder') renderFolder();
  if (s === 'note') renderNote();
  if (s === 'research') renderResearch();
}

function setOcr(on) {
  ocrOnline = on;
  const btn = $('#upload-btn');
  const toggle = $('#ocr-toggle');
  if (toggle) toggle.checked = on;
  if (btn) {
    btn.disabled = !on;
    btn.classList.toggle('is-disabled', !on);
  }
}

function escapeHtml(t) {
  return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function noteHtml(title, body) {
  return `<h1>${escapeHtml(title)}</h1><section><p>${escapeHtml(body).replace(/\n/g,'<br>')}</p></section>`;
}

function titleFromText(text) {
  const line = (text || '').split('\n').map(s => s.trim()).find(Boolean);
  return (line || 'Untitled note').slice(0, 64);
}

function sendNotes() {
  const ta = $('#note-input');
  const text = (ta?.value || '').trim() || MOCK_NOTE;
  if (ta && !ta.value.trim()) ta.value = text;

  const id = 'n-' + Date.now();
  const title = titleFromText(text);
  const note = {
    id,
    title,
    subject: 'Physics',
    status: 'processing',
    html: '',
    orchestrator: 'Physics',
    corrected: false,
  };
  notes = [note, ...notes];

  // Mock backend: classify + format finish later
  if (pendingTimer) clearTimeout(pendingTimer);
  pendingTimer = setTimeout(() => {
    const n = notes.find(x => x.id === id);
    if (!n) return;
    n.status = 'ready';
    n.subject = 'Physics';
    n.orchestrator = 'Physics';
    n.html = FORMATTED_HTML;
    research = [{ id, when: 'now', orchestrator: 'Physics', final: 'Physics', corrected: false }, ...research];
    // Refresh visible screens if user already navigated
    if (!$('[data-step="library"]')?.hidden) renderLibrary();
    if (!$('[data-step="folder"]')?.hidden && currentFolder === n.subject) renderFolder();
    if (!$('[data-step="research"]')?.hidden) renderResearch();
  }, 2200);

  const sentTitle = $('#sent-title');
  if (sentTitle) sentTitle.textContent = title;
  go('sent');
}

function onUpload(files) {
  if (!ocrOnline || !files?.length) return;
  const ta = $('#note-input');
  if (ta) ta.value = MOCK_NOTE;
}

function renderLibrary() {
  const processing = notes.filter(n => n.status === 'processing');
  const proc = $('#processing-list');
  if (proc) {
    proc.hidden = processing.length === 0;
    proc.innerHTML = processing.map(n =>
      `<div class="pending"><span>${escapeHtml(n.title)}</span><span class="muted">Processing</span></div>`
    ).join('');
  }

  const grid = $('#folders');
  if (!grid) return;
  grid.innerHTML = SUBJECTS.map(([name, color]) => {
    const n = notes.filter(x => x.status === 'ready' && x.subject === name).length;
    return `<button type="button" class="folder" style="--subj:${color}" data-folder="${name}">
      <span class="fname">${name}</span>
      <span class="fcount">${n}</span>
    </button>`;
  }).join('');
  $$('[data-folder]', grid).forEach(b => b.addEventListener('click', () => {
    currentFolder = b.dataset.folder;
    go('folder');
  }));
}

function renderFolder() {
  const nameEl = $('#folder-name');
  if (nameEl) {
    nameEl.textContent = currentFolder;
    nameEl.style.setProperty('--subj', SUBJECT_COLORS[currentFolder] || '#64748b');
  }
  const list = $('#folder-list');
  if (!list) return;
  const ready = notes.filter(n => n.status === 'ready' && n.subject === currentFolder);
  const pending = notes.filter(n => n.status === 'processing');
  let html = ready.map(n =>
    `<button type="button" class="note-item" data-nid="${n.id}">${escapeHtml(n.title)}</button>`
  ).join('');
  if (pending.length && currentFolder === 'Physics') {
    // show processing under any folder visit via library banner only; skip here
  }
  list.innerHTML = html || `<p class="muted">No notes yet</p>`;
  $$('[data-nid]', list).forEach(b => b.addEventListener('click', () => {
    currentNoteId = b.dataset.nid;
    go('note');
  }));
}

function renderNote() {
  const n = notes.find(x => x.id === currentNoteId);
  if (!n || n.status !== 'ready') {
    go('library');
    return;
  }
  currentFolder = n.subject;
  const color = SUBJECT_COLORS[n.subject] || '#64748b';
  const title = $('#note-title');
  if (title) title.textContent = n.title;
  const shell = $('#note-shell');
  if (shell) shell.style.setProperty('--subj', color);
  const body = $('#note-body');
  if (body) {
    body.innerHTML = n.html || noteHtml(n.title, 'Sample note.');
  }
  const sel = $('#subject-select');
  if (sel) {
    sel.innerHTML = SUBJECTS.map(([name]) =>
      `<option value="${name}" ${name === n.subject ? 'selected' : ''}>${name}</option>`
    ).join('');
  }
  const other = $('#other-field');
  if (other) other.hidden = n.subject !== 'Other';
  const saved = $('#subject-saved');
  if (saved) saved.hidden = true;
}

function changeSubject(next) {
  const n = notes.find(x => x.id === currentNoteId);
  if (!n || n.status !== 'ready') return;
  const prev = n.subject;
  if (next === prev) return;
  n.subject = next;
  n.corrected = next !== n.orchestrator;
  currentFolder = next;

  // Update research final label
  let row = research.find(r => r.id === n.id);
  if (!row) {
    row = { id: n.id, when: 'now', orchestrator: n.orchestrator, final: next, corrected: n.corrected };
    research = [row, ...research];
  } else {
    row.final = next;
    row.corrected = n.corrected;
  }

  const shell = $('#note-shell');
  if (shell) shell.style.setProperty('--subj', SUBJECT_COLORS[next] || '#64748b');
  const other = $('#other-field');
  if (other) other.hidden = next !== 'Other';
  const saved = $('#subject-saved');
  if (saved) {
    saved.hidden = false;
    saved.textContent = 'Updated';
    setTimeout(() => { saved.hidden = true; }, 1600);
  }
}

function renderResearch() {
  const body = $('#research-rows');
  if (!body) return;
  body.innerHTML = research.map(r => `
    <tr>
      <td>${escapeHtml(r.when)}</td>
      <td>${escapeHtml(r.orchestrator)}</td>
      <td>${escapeHtml(r.final)}</td>
      <td>${r.corrected ? 'Manual' : 'Auto'}</td>
      <td><button type="button" class="linkish" data-open-note="${r.id}">Open</button></td>
    </tr>
  `).join('');
  $$('[data-open-note]', body).forEach(b => b.addEventListener('click', () => {
    const n = notes.find(x => x.id === b.dataset.openNote && x.status === 'ready');
    if (!n) { go('library'); return; }
    currentNoteId = n.id;
    currentFolder = n.subject;
    go('note');
  }));
}

document.addEventListener('DOMContentLoaded', () => {
  $$('[data-go]').forEach(el => el.addEventListener('click', () => go(el.dataset.go)));
  $('#ocr-toggle')?.addEventListener('change', e => setOcr(e.target.checked));
  setOcr(true);
  $('#send-btn')?.addEventListener('click', sendNotes);
  const file = $('#file-input');
  $('#upload-btn')?.addEventListener('click', () => { if (ocrOnline) file?.click(); });
  file?.addEventListener('change', () => onUpload(file.files));
  $('#subject-select')?.addEventListener('change', e => changeSubject(e.target.value));
  go('input');
});

</script>
</body>
</html>
